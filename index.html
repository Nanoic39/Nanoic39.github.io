<!DOCTYPE html>
<html lang="zh-CN" class="/*dark*/">

<head>
    <!-- 基础信息 -->
    <meta charset="utf-8">
    <meta http-equiv="Access-Control-Allow-Origin" content="*">
    <meta name="renderer" content="webkit" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="force-rendering" content="webkit" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Nanoic的个人主页">
    <meta name="keywords" content="Nanoic,个人主页">
    <meta name="author" content="Nanoic">
    <title>Nanoic的个人主页</title>

    <script src="https://unpkg.com/vue/dist/vue.js"></script>
    <link rel="stylesheet" type="text/css" href="./css/style.css">

	<!-- Import style -->
	<link rel="stylesheet" href="//unpkg.com/element-plus/dist/index.css" />
	<!-- Import Vue 3 -->
	<script src="//unpkg.com/vue@3"></script>
	<!-- Import component library -->
  	<script src="//unpkg.com/element-plus"></script>
</head>

<body>
    <!-- 主体 -->
	<div id="app">
    <template>
      <div class="common-layout">
        <el-container>
          <el-aside width="200px" style="background-color: #409EFF;">Aside</el-aside>
          <el-container>
            <el-header>Header</el-header>
            <el-main>
              <template>
                <el-scrollbar height="400px">
                  <p v-for="item in 20" :key="item" class="scrollbar-demo-item">{{ item }}</p>
                </el-scrollbar>
              </template>
            </el-main>
          </el-container>
        </el-container>
      </div>
    </template>
  </div>
      <script>
        const App = {
          data() {
            return {
              message: "Hello Element Plus",
            };
          },
        };
        const app = Vue.createApp(App);
        app.use(ElementPlus);
        app.mount("#app");
      </script>

<style scoped>
  .scrollbar-demo-item {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 50px;
    margin: 10px;
    text-align: center;
    border-radius: 4px;
    background: var(--el-color-primary-light-9);
    color: var(--el-color-primary);
  }
  </style>

    <!-- noscript -->
    <noscript>
        <div class="noscript fixed-top">请开启 JavaScript</div>
    </noscrip>
</body>

</html>
